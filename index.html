<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Balloon Toss</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#0d0b1e; }
body { font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif; }
canvas { position:fixed; inset:0; display:block; }

#lobby {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:clamp(14px,3.5vw,24px);
  padding:20px; z-index:10;
}
.title {
  font-size:clamp(2.2rem,8vw,4.5rem); font-weight:900; color:#fff;
  text-shadow:0 4px 24px rgba(255,180,60,.6), 0 2px 0 rgba(0,0,0,.4);
  text-align:center;
}
.title span { display:inline-block; animation:wobble 2s ease-in-out infinite; }
@keyframes wobble { 0%,100%{transform:rotate(-3deg) scale(1)} 50%{transform:rotate(3deg) scale(1.05)} }

.glass {
  background:rgba(255,255,255,.10); backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.22); border-radius:26px;
  padding:clamp(18px,4vw,32px) clamp(22px,5vw,40px);
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(12px,2.8vw,20px); width:min(92vw,390px);
}
.btn {
  width:100%; padding:clamp(13px,3.2vw,18px); font-size:clamp(1rem,3.8vw,1.3rem);
  font-weight:800; border:none; border-radius:16px; cursor:pointer;
  transition:transform .1s, filter .1s; font-family:inherit;
  box-shadow:0 5px 18px rgba(0,0,0,.35);
}
.btn:active { transform:scale(.95); filter:brightness(.88); }
.btn-host  { background:linear-gradient(135deg,#ffbe3b,#ff7f3b); color:#fff; }
.btn-join  { background:linear-gradient(135deg,#7c5cfc,#d63aec); color:#fff; }
.btn-go    { background:linear-gradient(135deg,#3ae8a0,#3ab5fc); color:#fff; }
.btn-start { background:linear-gradient(135deg,#3ae8a0,#3ab5fc); color:#fff; display:none; }

.code-display {
  font-size:clamp(2.8rem,14vw,5.5rem); font-weight:900; letter-spacing:.18em;
  color:#ffe066; text-shadow:0 0 28px rgba(255,220,80,.7), 0 2px 0 rgba(0,0,0,.5);
  line-height:1; text-align:center;
}
.sublabel { font-size:clamp(.8rem,2.8vw,1rem); color:rgba(255,255,255,.65); text-align:center; }
#player-list { display:flex; flex-direction:column; gap:5px; width:100%; }
.player-row {
  display:flex; align-items:center; gap:8px;
  font-size:.85rem; color:rgba(255,255,255,.8); font-weight:700;
}
.player-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

input[type=text] {
  width:100%; font-size:clamp(1.8rem,10vw,3.5rem); text-align:center;
  font-weight:900; letter-spacing:.22em; padding:10px 10px;
  border-radius:14px; border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12); color:#fff; outline:none;
  font-family:inherit; caret-color:#ffe066;
}
input[type=text]::placeholder { opacity:.28; }
#status-msg { color:rgba(255,255,255,.6); font-size:.9rem; text-align:center; min-height:1.2em; }

/* HUD */
#hud {
  position:fixed; top:0; left:0; right:0; display:none;
  align-items:center; justify-content:center; flex-wrap:wrap; gap:6px 16px;
  padding:10px 16px;
  background:rgba(0,0,0,.3); backdrop-filter:blur(8px); z-index:5;
}
.score-chip {
  display:flex; align-items:center; gap:6px;
  font-size:clamp(1rem,4vw,1.5rem); font-weight:900;
  color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.5);
}
.score-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

#hint {
  position:fixed; bottom:clamp(16px,4vw,28px); left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.18); border-radius:50px;
  color:#fff; font-size:clamp(.9rem,3.2vw,1.1rem); font-weight:700;
  padding:clamp(8px,2vw,12px) clamp(16px,4vw,26px); white-space:nowrap;
  z-index:5; pointer-events:none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="lobby">
  <div class="title"><span>🎈</span> Balloon Toss</div>
  <div class="glass" id="card">
    <button class="btn btn-host" id="btn-host">🏠 Host Game</button>
    <button class="btn btn-join" id="btn-join">📲 Join Game</button>
  </div>
  <div id="status-msg"></div>
</div>

<div id="hud"></div>
<div id="hint" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  CANVAS & AUDIO
// ════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

let ac;
function getAC() { return ac || (ac = new (window.AudioContext||window.webkitAudioContext)()); }
function beep(freq,type,dur,vol,f2) {
  const a=getAC(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=type;
  o.frequency.setValueAtTime(freq,a.currentTime);
  if(f2) o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+dur);
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur+0.01);
}
function playWhoosh(){ beep(400,'sawtooth',.22,.18,80); }
function playMiss()  { beep(200,'triangle',.3,.25,100); }
function playCatch() { beep(520,'sine',.1,.3,900); setTimeout(()=>beep(780,'sine',.15,.22,1040),90); }

// ════════════════════════════════════════════════════════
//  PLAYER CONSTANTS
// ════════════════════════════════════════════════════════
const P_COLORS = ['#ffbe3b','#a29bfe','#55efc4','#fd79a8'];
const P_NAMES  = ['Player 1','Player 2','Player 3','Player 4'];

// ════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════
let gameActive  = false;
let myId        = 0;      // 0=host, 1-3=joiner
let playerCount = 1;      // total players (set at start)
let scores      = [0,0,0,0];
let holder      = 0;      // who currently owns the balloon
let lastThrower = 0;

// Balloon
const bl = { x:0,y:0,vx:0,vy:0,r:60,color:'#ff6b6b',status:'none',bobP:0,alpha:1 };
let driftT=0, driftFreq=0.05, driftAmp=2;
let particles=[], stars=[], bgT=0, colorIdx=0;

const PALETTES = ['#ff6b6b','#ffd93d','#6bcff6','#a29bfe','#fd79a8','#55efc4','#fdcb6e','#e17055','#74b9ff','#00cec9'];
function nextColor(){ colorIdx=(colorIdx+1)%PALETTES.length; return PALETTES[colorIdx]; }
function balloonR(){ return Math.min(W,H)*0.11; }

// ════════════════════════════════════════════════════════
//  NETWORK — HOST
// ════════════════════════════════════════════════════════
let peer, hostConns=[], conn; // conn = joiner's connection to host
let isHost=false;

// Host: send to one player (0=self, 1-3=joiner via hostConns[id-1])
function hostSendTo(id, msg) {
  if (id === myId) { onMyMsg(msg); return; }
  const c = hostConns[id-1];
  if (c && c.open) { try { c.send(JSON.stringify(msg)); } catch(e){} }
}
// Host: broadcast to all current players
function hostBroadcast(msg, except) {
  for (let i=0; i<playerCount; i++) {
    if (i===except) continue;
    hostSendTo(i, msg);
  }
}

// Host receives action from a player
function hostHandleAction(fromId, msg) {
  switch(msg.type) {
    case 'hit':
    case 'launched': {
      if (fromId !== holder) break;
      lastThrower = fromId;
      const targets = [];
      for (let i=0;i<playerCount;i++) if(i!==fromId) targets.push(i);
      const target = targets[Math.floor(Math.random()*targets.length)];
      holder = target;
      // 'launched' = fresh serve → new color; 'hit' = rally → keep color
      const color  = msg.type==='launched' ? nextColor() : bl.color;
      const df     = 0.03 + Math.random()*0.05;
      const da     = 1    + Math.random()*3;
      const initVx = (Math.random()-0.5)*8;
      hostSendTo(target, {type:'incoming', color, driftFreq:df, driftAmp:da, initVx});
      for (let i=0;i<playerCount;i++) {
        if(i!==target) hostSendTo(i, {type:'watching', holderId:target});
      }
      break;
    }
    case 'missed': {
      if (fromId !== holder) break;
      scores[lastThrower] = (scores[lastThrower]||0) + 1;
      holder = lastThrower;
      hostBroadcast({type:'scored', scores:scores.slice(0,playerCount), scorerId:lastThrower, nextServerId:lastThrower});
      break;
    }
  }
}

// ════════════════════════════════════════════════════════
//  NETWORK — JOINER
// ════════════════════════════════════════════════════════
function joinSend(msg) { try { conn && conn.open && conn.send(JSON.stringify(msg)); } catch(e){} }

// ════════════════════════════════════════════════════════
//  MESSAGE DISPATCH (messages addressed to me)
// ════════════════════════════════════════════════════════
function onMyMsg(msg) {
  switch(msg.type) {
    case 'incoming':
      receiveBalloon(msg);
      break;
    case 'watching':
      bl.status = 'watching';
      setHint('🎈 Going to ' + P_NAMES[msg.holderId] + '!');
      break;
    case 'scored':
      scores = msg.scores;
      renderHUD();
      if (msg.nextServerId === myId) {
        resetBalloon('mine');
      } else {
        bl.status = 'watching';
        setHint('🎈 ' + P_NAMES[msg.nextServerId] + ' serves next!');
      }
      break;
  }
}

// Joiner: messages from host
function onJoinerMsg(raw) {
  let msg; try { msg = JSON.parse(raw); } catch(e) { return; }
  if (msg.type === 'start') {
    myId        = msg.yourId;
    playerCount = msg.count;
    scores      = Array(playerCount).fill(0);
    startGame();
    // Host serves first
    if (myId === 0) {
      resetBalloon('mine');
    } else {
      bl.status = 'watching';
      setHint('🎈 ' + P_NAMES[0] + ' serves first!');
    }
    return;
  }
  onMyMsg(msg);
}

// ════════════════════════════════════════════════════════
//  BALLOON ACTIONS
// ════════════════════════════════════════════════════════
function resetBalloon(status) {
  bl.x=W/2; bl.y=H*0.54; bl.vx=0; bl.vy=0; bl.alpha=1;
  bl.status=status; bl.bobP=0;
  setHint(status==='mine' ? 'Tap or swipe UP to serve! 🎈' :
          status==='waiting' ? 'Waiting... 👀' : '');
}

function launchBalloon(vx,vy) {
  bl.vx=vx; bl.vy=Math.min(vy,-11); bl.status='launching';
  playWhoosh(); setHint('');
}

function receiveBalloon(msg) {
  bl.color     = msg.color || nextColor();
  bl.x         = W/2 + (Math.random()-0.5)*W*0.3;
  bl.y         = -balloonR()*3;
  bl.vy        = 2 + Math.random()*1.5;
  bl.vx        = msg.initVx || 0;
  driftT       = Math.random()*Math.PI*2;
  driftFreq    = msg.driftFreq || 0.05;
  driftAmp     = msg.driftAmp  || 2;
  bl.status    = 'incoming'; bl.alpha=1;
  setHint('Tap the balloon! 🎈');
}

function catchBalloon(tapX) {
  playCatch();
  spawnBurst(bl.x,bl.y,bl.color,16);
  bl.status='watching';
  setHint('Nice hit! 🎈');
  // Tapping the balloon IS the return — host immediately routes to next player
  if (isHost) { hostHandleAction(myId, {type:'hit'}); }
  else         { joinSend({type:'hit'}); }
}

// ════════════════════════════════════════════════════════
//  TOUCH / MOUSE
// ════════════════════════════════════════════════════════
const drag = { active:false, startX:0, startY:0, t:0 };

function onDown(x,y) {
  getAC();
  drag.active=true; drag.startX=x; drag.startY=y; drag.t=performance.now();

  if (bl.status==='incoming' && bl.y>0) {
    const dist = Math.hypot(x-bl.x, y-bl.y);
    if (dist < balloonR()*1.6) {
      catchBalloon(x);
      drag.active=false;
    }
    // Taps that miss the balloon are silently ignored
    return;
  }
}

function onUp(x,y) {
  if (!drag.active) return;
  drag.active=false;
  if (bl.status!=='mine') return;

  const dx=x-drag.startX, dy=y-drag.startY;
  const dt=Math.max(performance.now()-drag.t, 8);
  const dist=Math.hypot(dx,dy);
  const isSwipeUp = dy < -18;
  const isTap     = dist < 30 && dt < 350;

  if (isSwipeUp||isTap) {
    const rawVx = dx/dt*14;
    const rawVy = dy/dt*14;
    launchBalloon(rawVx, rawVy);
  }
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();const t=e.changedTouches[0];onUp(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('mousedown', e=>onDown(e.clientX,e.clientY));
canvas.addEventListener('mouseup',   e=>onUp(e.clientX,e.clientY));

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
let lastT=0;
function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts-lastT)/16, 3.5);
  lastT=ts;
  ctx.clearRect(0,0,W,H);
  drawBg(dt);

  bl.r=balloonR();
  const pulse=Math.sin(bgT*6)*0.5+0.5;

  switch(bl.status) {
    case 'mine': {
      bl.bobP+=0.038*dt;
      bl.y=H*0.54+Math.sin(bl.bobP)*13;
      bl.x=W/2+Math.cos(bl.bobP*0.72)*9;
      drawBalloon(bl.x,bl.y,bl.r,P_COLORS[myId],1);
      drawArrowUp(W/2,bl.y-bl.r*1.7,pulse);
      break;
    }
    case 'launching': {
      bl.x+=bl.vx*dt; bl.y+=bl.vy*dt;
      bl.alpha=Math.max(0,bl.alpha-0.05*dt);
      drawBalloon(bl.x,bl.y,bl.r,P_COLORS[myId],bl.alpha);
      if (bl.y < -bl.r*2.5 || bl.alpha<=0.02) {
        // Report to host
        if (isHost) {
          hostHandleAction(myId, {type:'launched'});
        } else {
          joinSend({type:'launched'});
        }
        bl.status='watching'; bl.alpha=1;
        setHint('Waiting...');
      }
      break;
    }
    case 'incoming': {
      // Sinusoidal drift
      driftT+=dt*0.055;
      bl.vx+=Math.sin(driftT*driftFreq*55)*driftAmp*0.08*dt;
      bl.vx=Math.max(-14,Math.min(14,bl.vx));
      bl.vy+=0.13*dt;
      bl.vy=Math.min(bl.vy,9);
      bl.x+=bl.vx*dt; bl.y+=bl.vy*dt;
      if(bl.x<bl.r){bl.x=bl.r;bl.vx=Math.abs(bl.vx)*0.6;}
      if(bl.x>W-bl.r){bl.x=W-bl.r;bl.vx=-Math.abs(bl.vx)*0.6;}
      drawBalloon(bl.x,bl.y,bl.r,bl.color,1);
      // Pulsing ring to help aim
      if(bl.y>0){
        ctx.globalAlpha=0.15+0.12*pulse;
        ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r*1.65,0,Math.PI*2);
        ctx.strokeStyle='#ffffff';ctx.lineWidth=3;ctx.stroke();
        ctx.globalAlpha=1;
      }
      // Indicator dot at top edge
      if(bl.y<bl.r*2){
        ctx.globalAlpha=0.7+0.25*pulse;
        ctx.fillStyle=bl.color;
        ctx.beginPath();ctx.arc(bl.x,14,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
      if(bl.y>H+bl.r*2){
        playMiss();
        spawnBurst(bl.x,H-40,'#ff6b6b',12);
        if(isHost){ hostHandleAction(myId,{type:'missed'}); }
        else       { joinSend({type:'missed'}); }
        bl.status='watching';
        setHint('Missed! 😅');
      }
      break;
    }
    case 'watching': {
      bl.bobP+=0.02*dt;
      const gy=H*0.54+Math.sin(bl.bobP)*8;
      drawBalloon(W/2,gy,bl.r*0.45,'#666',0.12);
      break;
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.vx*=0.97;p.rot+=p.rotV;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    if(p.shape==='rect'){ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.r,-p.r*.5,p.r*2,p.r);}
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
//  DRAWING HELPERS
// ════════════════════════════════════════════════════════
function initStars(){
  stars=Array.from({length:55},()=>({
    x:Math.random(),y:Math.random(),
    r:.5+Math.random()*1.8,phase:Math.random()*Math.PI*2,bright:.3+Math.random()*.7
  }));
}
initStars();

function drawBg(dt){
  bgT+=dt*0.004;
  const g=ctx.createLinearGradient(0,0,W*.6,H);
  g.addColorStop(0,'#0d0b1e');g.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    ctx.globalAlpha=(0.4+0.6*Math.sin(bgT*2+s.phase))*s.bright;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawBalloon(x,y,r,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=r*.5;ctx.shadowOffsetY=r*.25;
  ctx.beginPath();ctx.ellipse(x,y,r,r*1.12,0,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.shadowColor='transparent';
  const hi=ctx.createRadialGradient(x-r*.32,y-r*.38,r*.04,x,y,r);
  hi.addColorStop(0,'rgba(255,255,255,.52)');hi.addColorStop(.45,'rgba(255,255,255,.06)');hi.addColorStop(1,'rgba(0,0,0,.08)');
  ctx.beginPath();ctx.ellipse(x,y,r,r*1.12,0,0,Math.PI*2);ctx.fillStyle=hi;ctx.fill();
  ctx.beginPath();ctx.arc(x,y+r*1.12,r*.07,0,Math.PI*2);
  ctx.fillStyle=darken(color,40);ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y+r*1.19);
  ctx.quadraticCurveTo(x+r*.28,y+r*1.95,x-r*.08,y+r*2.75);
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.restore();
}

function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16)-amt;
  let g=parseInt(hex.slice(3,5),16)-amt;
  let b=parseInt(hex.slice(5,7),16)-amt;
  return'#'+[r,g,b].map(v=>Math.max(0,v).toString(16).padStart(2,'0')).join('');
}

function drawArrowUp(x,y,pulse){
  ctx.save();ctx.globalAlpha=0.3+0.28*pulse;ctx.fillStyle='#ffffff';
  const s=balloonR()*.5;
  ctx.beginPath();
  ctx.moveTo(x,y-s);ctx.lineTo(x-s*.6,y);ctx.lineTo(x-s*.2,y);
  ctx.lineTo(x-s*.2,y+s*.6);ctx.lineTo(x+s*.2,y+s*.6);
  ctx.lineTo(x+s*.2,y);ctx.lineTo(x+s*.6,y);
  ctx.closePath();ctx.fill();ctx.restore();
}

function spawnBurst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*9;
    particles.push({
      x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-5,
      r:3+Math.random()*5,color:PALETTES[Math.floor(Math.random()*PALETTES.length)],
      life:1,decay:.018+Math.random()*.022,
      shape:Math.random()<.4?'rect':'circle',rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.3
    });
  }
}

// ════════════════════════════════════════════════════════
//  UI
// ════════════════════════════════════════════════════════
const lobby  = document.getElementById('lobby');
const hud    = document.getElementById('hud');
const hintEl = document.getElementById('hint');

function setHint(t){ hintEl.textContent=t; hintEl.style.display=t?'block':'none'; }
function setStatus(t){ document.getElementById('status-msg').textContent=t; }

function renderHUD(){
  hud.innerHTML='';
  for(let i=0;i<playerCount;i++){
    const chip=document.createElement('div');
    chip.className='score-chip';
    chip.innerHTML=`<div class="score-dot" style="background:${P_COLORS[i]}"></div>${P_NAMES[i]}: <b style="color:${P_COLORS[i]};margin-left:4px">${scores[i]||0}</b>`;
    if(i===myId){ chip.style.textDecoration='underline'; chip.style.textUnderlineOffset='3px'; }
    hud.appendChild(chip);
  }
}

// ════════════════════════════════════════════════════════
//  GAME START
// ════════════════════════════════════════════════════════
function startGame(){
  gameActive=true;
  lobby.style.display='none';
  hud.style.display='flex';
  scores=Array(playerCount).fill(0);
  renderHUD();
  lastT=performance.now();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
//  LOBBY — HOST
// ════════════════════════════════════════════════════════
document.getElementById('btn-host').onclick=()=>{
  const code=String(Math.floor(1000+Math.random()*9000));
  isHost=true; myId=0; playerCount=1;
  setStatus('Connecting...');
  peer=new Peer('blt-'+code,{debug:0});
  peer.on('open',()=>{
    setStatus('');
    document.getElementById('card').innerHTML=`
      <div class="sublabel">Share this code with up to 3 friends:</div>
      <div class="code-display">${code}</div>
      <div id="player-list">
        <div class="player-row"><div class="player-dot" style="background:${P_COLORS[0]}"></div>${P_NAMES[0]} (you)</div>
      </div>
      <button class="btn btn-start" id="btn-start">▶ Start Game</button>
      <div class="sublabel" id="wait-lbl">Waiting for players... 🕐</div>`;
    document.getElementById('btn-start').onclick=hostStart;
  });
  peer.on('connection',c=>{
    if(playerCount>=4){ c.close(); return; }
    const pid=playerCount;
    playerCount++;
    hostConns[pid-1]=c;
    c.on('open',()=>{
      // Tell joiner their ID and current count
      c.send(JSON.stringify({type:'assigned',yourId:pid,count:playerCount}));
      updateHostLobby();
    });
    c.on('data',raw=>{
      let msg; try{msg=JSON.parse(raw);}catch(e){return;}
      if(!gameActive) return;
      hostHandleAction(pid, msg);
    });
    c.on('close',()=>{});
  });
  peer.on('error',e=>setStatus('Error: '+e.type+'. Try refreshing.'));
};

function updateHostLobby(){
  const list=document.getElementById('player-list');
  if(!list) return;
  list.innerHTML='';
  for(let i=0;i<playerCount;i++){
    const row=document.createElement('div');
    row.className='player-row';
    row.innerHTML=`<div class="player-dot" style="background:${P_COLORS[i]}"></div>${P_NAMES[i]}${i===0?' (you)':' ✓'}`;
    list.appendChild(row);
  }
  const startBtn=document.getElementById('btn-start');
  if(startBtn) startBtn.style.display= playerCount>=2?'block':'none';
  // Update all joiners with new count
  for(let i=0;i<playerCount-1;i++){
    const c=hostConns[i];
    if(c&&c.open) c.send(JSON.stringify({type:'players',count:playerCount}));
  }
}

function hostStart(){
  // Broadcast start to all joiners
  for(let i=0;i<playerCount-1;i++){
    const c=hostConns[i];
    if(c&&c.open) c.send(JSON.stringify({type:'start',yourId:i+1,count:playerCount}));
  }
  holder=0; lastThrower=0;
  startGame();
  resetBalloon('mine'); // host serves first
  // Tell others they're watching
  for(let i=1;i<playerCount;i++){
    hostSendTo(i,{type:'watching',holderId:0});
  }
}

// ════════════════════════════════════════════════════════
//  LOBBY — JOINER
// ════════════════════════════════════════════════════════
document.getElementById('btn-join').onclick=()=>{
  document.getElementById('card').innerHTML=`
    <div class="sublabel">Enter the 4-digit code from the host:</div>
    <input type="text" id="jc" inputmode="numeric" maxlength="4" placeholder="1234" autocomplete="off">
    <button class="btn btn-go" id="btn-go">Connect 🚀</button>`;
  const doJoin=()=>{
    const code=document.getElementById('jc').value.trim();
    if(code.length<4){setStatus('Enter all 4 digits!');return;}
    setStatus('Connecting...');
    peer=new Peer({debug:0});
    peer.on('open',()=>{
      conn=peer.connect('blt-'+code,{reliable:true});
      conn.on('open',()=>setStatus('Connected! Waiting for host to start...'));
      conn.on('data',raw=>{
        let msg; try{msg=JSON.parse(raw);}catch(e){return;}
        if(msg.type==='assigned'){
          myId=msg.yourId; playerCount=msg.count;
          setStatus('You are '+P_NAMES[myId]+'! Waiting for host...');
        } else if(msg.type==='players'){
          playerCount=msg.count;
          setStatus('Players connected: '+msg.count+'/4. Waiting for host...');
        } else {
          onJoinerMsg(raw);
        }
      });
    });
    peer.on('error',e=>setStatus('Could not connect — check the code.'));
  };
  document.getElementById('btn-go').onclick=doJoin;
  document.getElementById('jc').onkeydown=e=>{if(e.key==='Enter')doJoin();};
  setTimeout(()=>{const el=document.getElementById('jc');if(el)el.focus();},80);
};

// ════════════════════════════════════════════════════════
//  LOBBY BG ANIMATION
// ════════════════════════════════════════════════════════
(function lobbyBg(){
  if(gameActive) return;
  ctx.clearRect(0,0,W,H);bgT+=0.005;drawBg(1);
  requestAnimationFrame(lobbyBg);
})();
</script>
