<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Balloon Toss</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#0d0b1e; }
body { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; }

canvas { position:fixed; inset:0; display:block; }

#lobby {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:clamp(16px,4vw,28px);
  padding:20px; z-index:10; background:transparent;
}

.title {
  font-size:clamp(2.4rem,9vw,5rem); font-weight:900; color:#fff;
  text-shadow:0 4px 24px rgba(255,180,60,.6), 0 2px 0 rgba(0,0,0,.4);
  letter-spacing:-.01em; text-align:center;
}
.title span { display:inline-block; animation: wobble 2s ease-in-out infinite; }
@keyframes wobble { 0%,100%{transform:rotate(-3deg) scale(1)} 50%{transform:rotate(3deg) scale(1.05)} }

.glass {
  background:rgba(255,255,255,.10); backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.22); border-radius:28px;
  padding:clamp(20px,5vw,36px) clamp(24px,6vw,44px);
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(14px,3vw,22px); width:min(92vw,400px);
}

.btn {
  width:100%; padding:clamp(14px,3.5vw,20px); font-size:clamp(1.1rem,4vw,1.4rem);
  font-weight:800; border:none; border-radius:18px; cursor:pointer;
  transition:transform .12s, filter .12s; letter-spacing:.01em;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}
.btn:active { transform:scale(.95); filter:brightness(.88); }
.btn-host { background:linear-gradient(135deg,#ffbe3b,#ff7f3b); color:#fff; }
.btn-join { background:linear-gradient(135deg,#7c5cfc,#d63aec); color:#fff; }
.btn-go   { background:linear-gradient(135deg,#3ae8a0,#3ab5fc); color:#fff; }

.code-display {
  font-size:clamp(3rem,16vw,6rem); font-weight:900; letter-spacing:.18em;
  color:#ffe066; text-shadow:0 0 30px rgba(255,220,80,.7), 0 2px 0 rgba(0,0,0,.5);
  line-height:1; padding:8px 16px; text-align:center;
}
.sublabel { font-size:clamp(.85rem,3vw,1.05rem); color:rgba(255,255,255,.65); text-align:center; }

input[type=text] {
  width:100%; font-size:clamp(2rem,12vw,4rem); text-align:center;
  font-weight:900; letter-spacing:.25em; padding:clamp(10px,2.5vw,16px) 12px;
  border-radius:16px; border:2px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12); color:#fff; outline:none;
  font-family:inherit; caret-color:#ffe066;
}
input[type=text]::placeholder { opacity:.3; }

#status-msg { color:rgba(255,255,255,.65); font-size:clamp(.85rem,3vw,1rem); text-align:center; }

/* HUD */
#hud {
  position:fixed; top:0; left:0; right:0; display:none;
  justify-content:space-between; align-items:center;
  padding:clamp(10px,2.5vw,16px) clamp(16px,4vw,24px);
  background:rgba(0,0,0,.28); backdrop-filter:blur(8px); z-index:5;
}
.hud-score {
  font-size:clamp(1.6rem,6vw,2.4rem); font-weight:900; color:#ffe066;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}
.hud-icon { font-size:clamp(1.4rem,5vw,2rem); }

#hint {
  position:fixed; bottom:clamp(16px,4vw,28px); left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.45); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.18); border-radius:50px;
  color:#fff; font-size:clamp(.95rem,3.5vw,1.2rem); font-weight:700;
  padding:clamp(8px,2vw,12px) clamp(18px,4vw,28px); white-space:nowrap;
  z-index:5; pointer-events:none; transition:opacity .3s;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="lobby">
  <div class="title"><span>🎈</span> Balloon Toss</div>
  <div class="glass" id="card">
    <button class="btn btn-host" id="btn-host">🏠 Host Game</button>
    <button class="btn btn-join" id="btn-join">📲 Join Game</button>
  </div>
  <div id="status-msg"></div>
</div>

<div id="hud">
  <div class="hud-score" id="score-me">⭐ 0</div>
  <div class="hud-icon">🎈</div>
  <div class="hud-score" id="score-them">0 ⭐</div>
</div>

<div id="hint" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
<script>
// ─── Canvas ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

// ─── Audio ─────────────────────────────────────────────────────────────────
let ac;
function getAC() { return ac || (ac = new (window.AudioContext || window.webkitAudioContext)()); }
function beep(freq, type, dur, vol, freqEnd) {
  const a = getAC(), o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = type; o.frequency.setValueAtTime(freq, a.currentTime);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, a.currentTime + dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.start(); o.stop(a.currentTime + dur + 0.01);
}
function playPop()    { beep(700, 'sine', 0.18, 0.4, 200); }
function playWhoosh() { beep(400, 'sawtooth', 0.22, 0.2, 80); }
function playMiss()   { beep(200, 'triangle', 0.3, 0.3, 100); }
function playCatch()  { beep(520, 'sine', 0.1, 0.35, 900); setTimeout(() => beep(780, 'sine', 0.15, 0.25, 1040), 90); }

// ─── Network ───────────────────────────────────────────────────────────────
let peer, conn;
let isHost = false;

function send(msg) { try { conn && conn.open && conn.send(JSON.stringify(msg)); } catch(e){} }

function onMessage(raw) {
  let msg;
  try { msg = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) { return; }
  switch (msg.type) {
    case 'launch': receiveBalloon(msg); break;
    case 'missed':
      myScore++;
      updateHUD();
      spawnBurst(W / 2, H * 0.7, '#ffd93d', 18);
      resetBalloon('mine');
      break;
  }
}

// ─── Game state ─────────────────────────────────────────────────────────────
let gameActive = false;
let myScore = 0, theirScore = 0;
let particles = [];
let stars = [];
let bgT = 0;
let colorIdx = 0;

const PALETTES = [
  '#ff6b6b', '#ffd93d', '#6bcff6', '#a29bfe', '#fd79a8',
  '#55efc4', '#fdcb6e', '#e17055', '#74b9ff', '#00cec9'
];
function nextColor() { colorIdx = (colorIdx + 1) % PALETTES.length; return PALETTES[colorIdx]; }

// Balloon object
const bl = { x:0, y:0, vx:0, vy:0, r:60, color:'#ff6b6b', status:'none', bobP:0, alpha:1 };

function balloonR() { return Math.min(W, H) * 0.115; }

function resetBalloon(status) {
  bl.x = W / 2; bl.y = H * 0.54;
  bl.vx = 0; bl.vy = 0; bl.alpha = 1;
  bl.color = nextColor(); bl.status = status;
  setHint(status === 'mine'    ? 'Tap or swipe UP to serve! 🎈' :
          status === 'waiting' ? 'Waiting for the balloon... 👀' : '');
}

// ─── Touch / Mouse ─────────────────────────────────────────────────────────
const drag = { active:false, startX:0, startY:0, x:0, y:0, t:0 };

function onDown(x, y) {
  getAC();
  drag.active = true;
  drag.startX = drag.x = x;
  drag.startY = drag.y = y;
  drag.t = performance.now();

  // Catch on touchstart — much more responsive than waiting for touchend
  if (bl.status === 'incoming' && bl.y > 0) {
    returnBalloon(x);
    drag.active = false;
  }
}

function onMove(x, y) {
  if (!drag.active) return;
  drag.x = x; drag.y = y;
}

function onUp(x, y) {
  if (!drag.active) return;
  drag.active = false;

  if (bl.status !== 'mine') return;

  const dx = x - drag.startX;
  const dy = y - drag.startY;
  const dt = Math.max(performance.now() - drag.t, 8);
  const dist = Math.hypot(dx, dy);

  // Any upward swipe OR a simple tap — both launch the balloon
  const isSwipeUp = dy < -18;
  const isTap     = dist < 30 && dt < 350;

  if (isSwipeUp || isTap) {
    // Derive velocity from swipe; clamp so it always goes up with good speed
    const rawVx = dx / dt * 14;
    const rawVy = dy / dt * 14;
    const launchVy = Math.min(rawVy, -12); // always at least -12 upward
    launchBalloon(rawVx, launchVy);
  }
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; onDown(t.clientX, t.clientY); }, { passive:false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive:false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); const t = e.changedTouches[0]; onUp(t.clientX, t.clientY); }, { passive:false });
canvas.addEventListener('mousedown',  e => onDown(e.clientX, e.clientY));
canvas.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup',    e => onUp(e.clientX, e.clientY));

// ─── Game actions ───────────────────────────────────────────────────────────
function launchBalloon(vx, vy) {
  bl.status = 'launching'; bl.vx = vx; bl.vy = vy;
  playWhoosh(); setHint('');
}

function returnBalloon(tapX) {
  // Tap position steers the return: left tap = drifts left, right tap = right
  const steer = ((tapX ?? W / 2) / W - 0.5) * 12;
  bl.vx = steer;
  bl.vy = -(13 + Math.random() * 3);
  bl.status = 'launching';
  playCatch();
  spawnBurst(bl.x, bl.y, bl.color, 14);
  setHint('');
}

function receiveBalloon(msg) {
  bl.color = msg.color || nextColor();
  bl.x = W * (1 - (msg.relX ?? 0.5));
  bl.y = -balloonR() * 3;
  bl.vx = -(msg.vx || 0) * 0.18;
  bl.vy = 2.5 + Math.random() * 1.5;
  bl.status = 'incoming'; bl.alpha = 1;
  setHint('Tap to return it! 🎈');
}

// ─── Particles ──────────────────────────────────────────────────────────────
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 3 + Math.random() * 9;
    const c = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 5,
      r: 3.5 + Math.random() * 5.5,
      color: c, life: 1,
      decay: 0.018 + Math.random() * 0.022,
      shape: Math.random() < 0.4 ? 'rect' : 'circle',
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - .5) * 0.3
    });
  }
}

// ─── Background ─────────────────────────────────────────────────────────────
const BG_THEMES = [
  ['#0d0b1e', '#1a0a2e'],
  ['#0a1628', '#0d2240'],
  ['#1a0d28', '#2a1040'],
];
let bgThemeIdx = 0;

function initStars() {
  stars = Array.from({ length: 55 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.5 + Math.random() * 1.8,
    phase: Math.random() * Math.PI * 2,
    bright: 0.25 + Math.random() * 0.75
  }));
}
initStars();

function drawBg(dt) {
  bgT += dt * 0.004;
  const theme = BG_THEMES[bgThemeIdx % BG_THEMES.length];
  const g = ctx.createLinearGradient(0, 0, W * 0.6, H);
  g.addColorStop(0, theme[0]);
  g.addColorStop(1, theme[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const tw = 0.4 + 0.6 * Math.sin(bgT * 2 + s.phase);
    ctx.globalAlpha = tw * s.bright;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── Draw balloon ───────────────────────────────────────────────────────────
function drawBalloon(x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,.4)';
  ctx.shadowBlur = r * 0.5;
  ctx.shadowOffsetY = r * 0.25;

  // Body
  ctx.beginPath(); ctx.ellipse(x, y, r, r * 1.12, 0, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();

  // Highlight
  ctx.shadowColor = 'transparent';
  const hi = ctx.createRadialGradient(x - r * .32, y - r * .38, r * .04, x, y, r);
  hi.addColorStop(0, 'rgba(255,255,255,.52)');
  hi.addColorStop(.45, 'rgba(255,255,255,.06)');
  hi.addColorStop(1, 'rgba(0,0,0,.08)');
  ctx.beginPath(); ctx.ellipse(x, y, r, r * 1.12, 0, 0, Math.PI * 2);
  ctx.fillStyle = hi; ctx.fill();

  // Knot
  ctx.beginPath(); ctx.arc(x, y + r * 1.12, r * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = darken(color, 40); ctx.fill();

  // String
  ctx.beginPath(); ctx.moveTo(x, y + r * 1.19);
  ctx.quadraticCurveTo(x + r * .28, y + r * 1.95, x - r * .08, y + r * 2.75);
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 1.8; ctx.stroke();

  ctx.restore();
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  return '#' + [r,g,b].map(v => Math.max(0,v).toString(16).padStart(2,'0')).join('');
}

// ─── Arrow indicator ────────────────────────────────────────────────────────
function drawArrowUp(x, y, pulse) {
  ctx.save();
  ctx.globalAlpha = 0.35 + 0.3 * pulse;
  ctx.fillStyle = '#ffffff';
  const s = balloonR() * 0.55;
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x - s * 0.6, y);
  ctx.lineTo(x - s * 0.2, y);
  ctx.lineTo(x - s * 0.2, y + s * 0.6);
  ctx.lineTo(x + s * 0.2, y + s * 0.6);
  ctx.lineTo(x + s * 0.2, y);
  ctx.lineTo(x + s * 0.6, y);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── Main loop ──────────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastT) / 16, 3.5);
  lastT = ts;

  ctx.clearRect(0, 0, W, H);
  drawBg(dt);

  bl.r = balloonR();
  const pulse = Math.sin(bgT * 6) * 0.5 + 0.5;

  switch (bl.status) {
    case 'mine': {
      if (!drag.active) {
        bl.bobP += 0.038 * dt;
        bl.y = H * 0.54 + Math.sin(bl.bobP) * 13;
        bl.x = W / 2 + Math.cos(bl.bobP * 0.72) * 9;
      }
      drawBalloon(bl.x, bl.y, bl.r, bl.color, 1);
      if (!drag.active) drawArrowUp(W / 2, bl.y - bl.r * 1.7, pulse);
      break;
    }
    case 'launching': {
      bl.x += bl.vx * dt; bl.y += bl.vy * dt;
      bl.alpha = Math.max(0, bl.alpha - 0.05 * dt);
      drawBalloon(bl.x, bl.y, bl.r, bl.color, bl.alpha);
      if (bl.y < -bl.r * 2.5 || bl.alpha <= 0.02) {
        send({ type:'launch', vx: bl.vx, vy: bl.vy, relX: bl.x / W, color: bl.color });
        bl.status = 'waiting'; bl.alpha = 1;
        setHint('Waiting... 👀');
      }
      break;
    }
    case 'incoming': {
      bl.vy += 0.14 * dt;
      bl.vy = Math.min(bl.vy, 8);
      bl.x += bl.vx * dt; bl.y += bl.vy * dt;
      if (bl.x < bl.r) { bl.x = bl.r; bl.vx = Math.abs(bl.vx) * 0.5; }
      if (bl.x > W - bl.r) { bl.x = W - bl.r; bl.vx = -Math.abs(bl.vx) * 0.5; }
      drawBalloon(bl.x, bl.y, bl.r, bl.color, 1);
      // Pulsing tap ring
      if (bl.y > 0) {
        ctx.globalAlpha = 0.12 + 0.12 * pulse;
        ctx.beginPath(); ctx.arc(bl.x, bl.y, bl.r * 1.7, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
        ctx.globalAlpha = 1;
      }
      // Incoming indicator at top
      if (bl.y < bl.r * 2) {
        ctx.globalAlpha = 0.6 + 0.3 * pulse;
        ctx.fillStyle = bl.color;
        ctx.beginPath(); ctx.arc(W * (bl.x / W), 12, 8, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      if (bl.y > H + bl.r * 2) {
        playMiss();
        send({ type:'missed' });
        theirScore++;
        spawnBurst(bl.x, H - 40, '#ff6b6b', 12);
        bl.status = 'waiting'; bl.alpha = 1;
        updateHUD();
        setHint('You missed... 😅 They serve next');
      }
      break;
    }
    case 'waiting': {
      bl.bobP += 0.022 * dt;
      const gy = H * 0.54 + Math.sin(bl.bobP) * 8;
      drawBalloon(W / 2, gy, bl.r * 0.48, '#666', 0.14);
      break;
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.28;
    p.vx *= 0.97; p.rot += p.rotV;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

// ─── UI helpers ─────────────────────────────────────────────────────────────
const lobby  = document.getElementById('lobby');
const hud    = document.getElementById('hud');
const hintEl = document.getElementById('hint');

function setHint(text) {
  hintEl.textContent = text;
  hintEl.style.display = text ? 'block' : 'none';
}
function updateHUD() {
  document.getElementById('score-me').textContent  = '⭐ ' + myScore;
  document.getElementById('score-them').textContent = theirScore + ' ⭐';
}
function setStatus(t) { document.getElementById('status-msg').textContent = t; }

function startGame(host) {
  isHost = host;
  lobby.style.display = 'none';
  hud.style.display = 'flex';
  gameActive = true;
  myScore = 0; theirScore = 0; updateHUD();
  resetBalloon(host ? 'mine' : 'waiting');
  lastT = performance.now();
  requestAnimationFrame(loop);
}

// ─── Lobby ───────────────────────────────────────────────────────────────────
document.getElementById('btn-host').onclick = () => {
  const code = String(Math.floor(1000 + Math.random() * 9000));
  setStatus('Connecting to server...');
  peer = new Peer('blt-' + code, { debug: 0 });
  peer.on('open', () => {
    setStatus('');
    document.getElementById('card').innerHTML = `
      <div class="sublabel">Tell the other player this code:</div>
      <div class="code-display">${code}</div>
      <div class="sublabel">Waiting for them to join... 🕐</div>
    `;
  });
  peer.on('connection', c => {
    conn = c;
    conn.on('open', () => startGame(true));
    conn.on('data', d => onMessage(d));
    conn.on('error', e => setStatus('Connection lost.'));
  });
  peer.on('error', e => setStatus('Error: ' + e.type + '. Try refreshing.'));
};

document.getElementById('btn-join').onclick = () => {
  document.getElementById('card').innerHTML = `
    <div class="sublabel">Enter the 4-digit code from the host:</div>
    <input type="text" id="jc" inputmode="numeric" maxlength="4" placeholder="1234" autocomplete="off">
    <button class="btn btn-go" id="btn-go">Connect 🚀</button>
  `;
  const doJoin = () => {
    const code = document.getElementById('jc').value.trim();
    if (code.length < 4) { setStatus('Enter all 4 digits!'); return; }
    setStatus('Connecting...');
    peer = new Peer({ debug: 0 });
    peer.on('open', () => {
      conn = peer.connect('blt-' + code, { reliable: true });
      conn.on('open', () => startGame(false));
      conn.on('data', d => onMessage(d));
    });
    peer.on('error', e => setStatus('Could not connect. Check the code.'));
  };
  document.getElementById('btn-go').onclick = doJoin;
  document.getElementById('jc').onkeydown = e => { if (e.key === 'Enter') doJoin(); };
  setTimeout(() => { const el = document.getElementById('jc'); if (el) el.focus(); }, 100);
};

// ─── Background canvas loop (lobby) ─────────────────────────────────────────
(function lobbyBg() {
  if (gameActive) return;
  ctx.clearRect(0, 0, W, H);
  bgT += 0.005;
  drawBg(1);
  requestAnimationFrame(lobbyBg);
})();
</script>
</body>
</html>
